<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=240, height=320, initial-scale=1.0">
  <title>CloudPhone BMI App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h2>BMI Calculator</h2>
  </header>

  <main>
    <!-- Home Page -->
    <section id="home" class="page">
      <div class="card">
        <label>Weight</label>
        <input type="number" id="weight" placeholder="Enter weight">
        <select id="weightUnit">
          <option value="kg">kg</option>
          <option value="lb">lb</option>
        </select>

        <label>Height</label>
        <input type="number" id="heightCm" placeholder="Enter height (cm)">
        <select id="heightUnit" onchange="toggleHeightFields()">
          <option value="cm">cm</option>
          <option value="ft">ft/in</option>
        </select>

        <!-- Imperial height fields -->
        <div id="imperialHeight" class="hidden">
          <input type="number" id="heightFt" placeholder="Feet">
          <input type="number" id="heightIn" placeholder="Inches">
        </div>

        <button class="primary" onclick="calculateBMI()">Calculate BMI</button>
        <p id="result"></p>
      </div>
    </section>

    <!-- Help Page -->
    <section id="help" class="page hidden">
      <div class="card">
        <h3>Help</h3>
        <p>Enter your weight and height, choose units (kg/lb, cm/ft+in), then press "Calculate BMI".</p>
      </div>
    </section>

    <!-- About Page -->
    <section id="about" class="page hidden">
      <div class="card">
        <h3>About</h3>
        <p><strong>App Name:</strong> CloudPhone BMI App</p>
        <p><strong>Version:</strong> 1.2</p>
        <p><strong>Developer:</strong> Tasmon Islam</p>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('help')">Help</button>
    <button onclick="showPage('about')">About</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
